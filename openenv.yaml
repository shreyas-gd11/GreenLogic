name: GreenLogicEnv
description: AI-driven agricultural environment

observation_space:
  day: integer
  soilMoisture: float
  temperature: float
  cropHealth: float
  cropType: string

state:
  day: integer
  soilMoisture: float
  temperature: float
  cropHealth: float
  cropType: string

action_space:
  type: discrete
  values:
    - water
    - fertilize
    - do_nothing

actions:
  - water
  - fertilize
  - do_nothing

reward:
  type: float
  range: 0.01-0.99

episode_length: 30

tasks:
  tomato:
    id: task_easy
    difficulty: Easy
    optimalMoisture: 55.0
    grader: graders.easy_grader
  rice:
    id: task_medium
    difficulty: Medium
    optimalMoisture: 75.0
    grader: graders.medium_grader
  sugarcane:
    id: task_hard
    difficulty: Hard
    optimalMoisture: 65.0
    grader: graders.hard_grader
