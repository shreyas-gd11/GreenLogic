name: GreenLogicEnv
description: AI-driven agricultural environment

observation_space:
  day: integer
  soilMoisture: float
  temperature: float
  cropHealth: float
  cropType: string

state:
  day: integer
  soilMoisture: float
  temperature: float
  cropHealth: float
  cropType: string

action_space:
  type: discrete
  values:
    - water
    - fertilize
    - do_nothing

actions:
  - water
  - fertilize
  - do_nothing

reward:
  type: float
  range: 0.01-0.99

episode_length: 30

tasks:
  - id: tomato_easy
    name: Tomato Easy
    cropType: tomato
    difficulty: Easy
    grader: graders.EasyGrader
  - id: rice_medium
    name: Rice Medium
    cropType: rice
    difficulty: Medium
    grader: graders.MediumGrader
  - id: sugarcane_hard
    name: Sugarcane Hard
    cropType: sugarcane
    difficulty: Hard
    grader: graders.HardGrader
